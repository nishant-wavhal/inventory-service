# =========================================================
# Application
# =========================================================
server.port=8082
spring.application.name=inventory-service

# =========================================================
# PostgreSQL
# =========================================================
spring.datasource.url=jdbc:postgresql://ecommerce-postgres:5432/inventorydb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# =========================================================
# JPA / Hibernate
# =========================================================
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# =========================================================
# Redis
# =========================================================
spring.data.redis.host=ecommerce-redis
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms

# =========================================================
# Kafka
# =========================================================
spring.kafka.bootstrap-servers=ecommerce-kafka:9092

# Kafka Consumer
spring.kafka.consumer.group-id=inventory-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# Kafka Producer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Kafka Listener
spring.kafka.listener.ack-mode=manual
spring.kafka.listener.concurrency=1

# =========================================================
# Logging
# =========================================================
logging.level.root=INFO
logging.level.com.ecommerce.inventory_service=DEBUG
logging.level.org.springframework.kafka=INFO
logging.level.org.hibernate.SQL=DEBUG

# Keep logs structured enough for Loki later
logging.pattern.level=%5p [${spring.application.name:inventory-service}]

# =========================================================
# Actuator
# =========================================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

# =========================================================
# Micrometer / Prometheus
# =========================================================
management.prometheus.metrics.export.enabled=true

management.metrics.tags.application=ecommerce
management.metrics.tags.service=inventory-service
management.metrics.tags.environment=local

# Custom InventoryMetrics names:
# inventory_operation_total
# inventory_operation_outcome
# inventory_operation_retry
# inventory_operation_timeout
# inventory_operation_duration

# =========================================================
# OpenTelemetry
# =========================================================
otel.service.name=inventory-service

otel.resource.attributes=service.namespace=ecommerce,service.version=0.0.1-SNAPSHOT,deployment.environment=local

# OTLP endpoint.
# In Docker network, this should be otel-collector.
# For local non-Docker run, override with:
# OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4318
otel.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://otel-collector:4318}
otel.exporter.otlp.protocol=http/protobuf

# Traces go to OTel Collector.
otel.traces.exporter=otlp

# Metrics are exposed through /actuator/prometheus instead.
otel.metrics.exporter=none

# Logs stay through SLF4J/Loki path later.
otel.logs.exporter=none

# Trace context propagation across HTTP/Kafka boundaries.
otel.propagators=tracecontext,baggage

# Keep instrumentation enabled.
otel.instrumentation.spring-web.enabled=true
otel.instrumentation.spring-webmvc.enabled=true
otel.instrumentation.jdbc.enabled=true
otel.instrumentation.kafka.enabled=true

# =========================================================
# Resilience
# =========================================================
resilience.retry.max-attempts=3
resilience.retry.delay-ms=1000

resilience.timeout.database-ms=3000
resilience.timeout.redis-ms=1000
resilience.timeout.kafka-ms=5000